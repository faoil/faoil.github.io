<style>
  * { box-sizing: border-box; }

  body {
    background-color: #d7c5e0;
    background-image: url('https://file.garden/ajoHkVuFdR0QM5sO/Sites/darkattic.png');
    background-repeat: no-repeat;
    background-size: cover;
    background-attachment: fixed;
    background-position: center center;
    color: white;
    font-family: 'Geist Pixel', sans-serif;
    display: flex;
    min-height: 100vh;
    margin: 0;
  }

  #all {
    max-width: 100%;
    overflow: auto;
    margin: auto;
    border-radius: 25px;
    padding: 0 8px;
  }

  img { opacity: 1;  height: auto; }

  h1 {
    font-family: 'Geist Pixel', sans-serif;
    text-align: center;
    font-size: 45px;
    font-weight: normal;
    color: #fff;
    margin: 0;
    background: #00000066;
    border-radius: 25px 25px 0 0;
  }

  #nav {
    background-image: url('https://i.postimg.cc/50KgFbcr/Screenshot-2025-08-13-101616.png');
    width: 100%;
    max-width: 500px;
    height: 40px;
    display: inline-block;
    align-self: center center;
    border-radius: 25px 25px 0 0;
  }

  ul {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    padding: 0;
    margin: 0;
    list-style: none;
    width: 100%;
  }

  li {
    list-style-type: none;
    padding: 20px;
  }

  a {
    text-decoration: none;
    color: white;
    display: inline-block;
  }

  a:hover { font-weight: bold; color: black; }

  #main {
    background-color: #00000066;
    width: 100%;
    width: 500px;
    height: 450px;
    padding: 15px;
    text-align: center;
    align-self: center center;
    z-index: 200;
    overflow-y: scroll;
    margin: 0 auto;
  }

  #main img { max-width: 490px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background-color: black; }
  ::-webkit-scrollbar-thumb { background-color: black; }

  * {
    cursor: url('https://file.garden/ajoHkVuFdR0QM5sO/Sites/lighteroff.png'), auto;
  }
  *:active {
    cursor: url('https://file.garden/ajoHkVuFdR0QM5sO/Sites/lighteron.png'), auto;
  }

  @media screen and (max-width: 800px) {
    #werewolf { display: none; }
  }

  @media screen and (max-width: 600px) {
    body {
      background-attachment: scroll; 
      display: block;
    }
    #all { padding: 0; border-radius: 0; }

    #nav {
      margin-top: 20px;
      height: auto;
      border-radius: 18px 18px 0 0;
    }
    ul { gap: 0; }
    li { padding: 10px 6px; }

    #main {
      height: auto;
      min-height: 60vh;
      max-width: 100%;
      border-radius: 0 0 18px 18px;
  }
</style>
</head>
