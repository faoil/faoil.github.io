  body {

    background-repeat: no-repeat;

    justify-content: center;
    align-items: center;
    padding: 0;
    margin: 0;
    list-style: none;
    width: 100%;
  }

  li {

    padding: 20px;

  a {
    text-decoration: none;
    color: white;
    display: inline-block;
  }

  a:hover { font-weight: bold; color: black; }

  #main {
    background-color: #00000066;

    overflow-y: scroll;
    margin: 0 auto;

  #main img { max-width: 430px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background-color: black; }
  ::-webkit-scrollbar-thumb { background-color: black; }

  * {
    cursor: url('https://file.garden/ajoHkVuFdR0QM5sO/Sites/lighteroff.png'), auto;
  }
  *:active {
    cursor: url('https://file.garden/ajoHkVuFdR0QM5sO/Sites/lighteron.png'), auto;

  #webrings, #follow, #counter { -webkit-filter: brightness(100%); }
  #webrings:hover, #follow:hover { -webkit-filter: brightness(60%); }


  @media screen and (max-width: 900px) {
    #logo { display: none; }
    #tail { display: none; }
    #chime { display: none; }
    #follow { display: none; }
    #webrings { display: none; }
    #counter { display: none; }
  }

  @media screen and (max-width: 600px) {
    body {
      background-attachment: scroll; 
      display: block;
    }
    #all { padding: 0; border-radius: 0; }

    #nav {
      margin-top: 20px;
      height: auto;
      border-radius: 18px 18px 0 0;
    }
    ul { gap: 0; }
    li { padding: 10px 6px; }

    #main {
      height: auto;
      min-height: 60vh;
      max-width: 100%;
      border-radius: 0 0 18px 18px;
    }

    #webrings, #follow #counter {
      position: static !important;
      transform: none !important;
      display: inline-block;
      margin: 8px;
    }
    #webrings img, #follow img { width: 88px; height: 31px; }
  }
  

#mobile-only {
